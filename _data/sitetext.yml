#
# Work based on https://github.com/mmistakes/minimal-mistakes/blob/master/_data/ui-text.yml
#
# Configuration: Add to _config.yml
# locale: "en-US"
#
# How to use:
# {{ site.data.ui-text[site.locale].<var_name> | default: 'text' }}

en: &DEFAULT_EN
  header:
    title: "[Your Project Title Here]"
    text: "A Digital Humanities exploration of [your dataset/topic] — DH 101, UCLA, Summer 2026"
    button: Explore Our Research
    buttonlink: "#about"

  # NOTE: Services section is not really needed for this project.
  # Left as a single minimal placeholder so the theme doesn't break.
  # If you want it gone entirely, remove the {% include services.html %}
  # (or equivalent) line from index.md, then you can delete this whole block.
  services:
    title: "Project Components"
    text: ""
    section: services
    list:
      - title: "Data Visualizations"
        desc: "Five original data visualizations exploring humanities questions raised by our dataset."
        icon: fas fa-chart-bar
      - title: "Maps"
        desc: "An original map displaying a property of our data related to a humanities question."
        icon: fas fa-map-marked-alt
      - title: "Written Narrative"
        desc: "A 2,000–3,000 word narrative describing our research and findings."
        icon: fas fa-book

  portfolio:
    title: "Data Visualizations"
    text: "Our original visualizations exploring the dataset."
    section: portfolio
    closebutton: "Close"

  timeline:
    title: "Timeline"
    text: "Key events and developments related to our dataset"
    section: timeline
    events:
      - title: "[Event Title]"
        year: "[Year]"
        desc: "[Description of this event/development and its relevance to your dataset.]"
        image: assets/img/timeline/1.jpg
        alt:
      - title: "[Event Title]"
        year: "[Year]"
        desc: "[Description of this event/development and its relevance to your dataset.]"
        image: assets/img/timeline/2.jpg
        alt:
      - title: "[Event Title]"
        year: "[Year]"
        desc: "[Description of this event/development and its relevance to your dataset.]"
        image: assets/img/timeline/3.jpg
        alt:
    end: "[Closing line for <br> the timeline, <br> if desired]"

  about:
    title: "About This Project"
    text: "sources, processing, presentation"
    body: |
      **Sources:** [Full technical description of where your data came from. Cite relevant class readings.]

      **Processing:** [Full technical description of how you cleaned, structured, and analyzed the data. Cite relevant class readings.]

      **Presentation:** [Full technical description of your design and presentation decisions, and why you made them. Cite relevant class readings.]

      **Acknowledgments:** [Thank anyone who helped you — professors, TAs, dataset providers, etc.]
    section: about

  clients:
    section: clients
    max-height: 100px
    horizontal-scrolling: ""
    list: []

  team:
    title: "OUR TEAM"
    text: "DH 101, UCLA — Summer 2026"
    subtext: "Short bios and a full accounting of who was responsible for what."
    section: team
    people:
      - name: "Nancy Hey"
        role: "Project Manager"
        image: assets/img/team/500x500.jpg
        social: []
      - name: "Alina Wang"
        role: "Web Designer"
        image: assets/img/team/500x500.jpg
        social: []
      - name: "Conner Levy"
        role: "Content Developer"
        image: assets/img/team/500x500.jpg
        social: []
      - name: "William Wu"
        role: "Data Specialist"
        image: assets/img/team/500x500.jpg
        social: []
      - name: "Cherry Chen"
        role: "Data Specialist"
        image: assets/img/team/500x500.jpg
        social: []
      - name: "Daniel Kim"
        role: "Data Visualization Specialist"
        image: assets/img/team/500x500.jpg
        social: []

  contact:
  title: "Data Critique"
  text: "What our dataset can and cannot tell us"
  section: contact
