<section id="contact">
  <div class="container">
    <div class="row">
      <div class="col-lg-8 mx-auto text-center">
        <h2 class="section-heading text-uppercase">{{ site.data.ui-text[site.locale].contact.title }}</h2>
        <h3 class="section-subheading text-muted">{{ site.data.ui-text[site.locale].contact.text }}</h3>
      </div>
      <div class="col-lg-8 mx-auto">
        {{ site.data.ui-text[site.locale].contact.body | markdownify }}
      </div>
    </div>
  </div>
</section>
